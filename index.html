<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Listening Room</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --bg: #0f0f0f;
            --text: #e0e0e0;
            --accent: #555;
            --meta: #888;
            --detail: #444;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 4px;
            color: var(--accent);
            margin-bottom: 2rem;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        #result {
            margin-top: 2rem;
            display: none;
        }

        .album {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 0.75rem;
            letter-spacing: -1px;
        }

        .artist {
            font-size: 1.8rem;
            font-weight: 300;
            color: var(--meta);
            margin-bottom: 1.5rem;
        }

        .metadata-line {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--detail);
            margin-bottom: 3rem;
        }

        button,
        label {
            background: none;
            border: 1px solid var(--accent);
            color: var(--text);
            padding: 14px 28px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            margin: 10px;
        }

        button:hover,
        label:hover {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        input[type="file"] {
            display: none;
        }

        .hidden {
            display: none;
        }

        .stats {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 2;
        }

        .update-link {
            background: none;
            border: none;
            color: #555;
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.65rem;
            padding: 0;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 id="header">The Listening Room</h1>

        <div id="upload-section">
            <label for="file-upload">Load Roon Export (CSV or XLSX)</label>
            <input type="file" id="file-upload" accept=".csv, .xlsx">
        </div>

        <div id="action-section" class="hidden">
            <button onclick="pickAlbum()">Find Today's Album</button>
        </div>

        <div id="result">
            <div class="album" id="display-album"></div>
            <div class="artist" id="display-artist"></div>
            <div class="metadata-line" id="display-meta"></div>
            <button onclick="pickAlbum()">Shuffle Again</button>
        </div>

        <div id="stats" class="stats"></div>
    </div>

    <script>
        let albumList = [];

        window.onload = function () {
            const savedData = localStorage.getItem('roonLibrary');
            if (savedData) {
                try {
                    albumList = JSON.parse(savedData);
                    if (albumList.length > 0) showActionUI(albumList.length);
                } catch (e) {
                    localStorage.removeItem('roonLibrary');
                }
            }
        };

        document.getElementById('file-upload').addEventListener('change', function (e) {
            const file = e.target.files[0];
            const isExcel = file.name.endsWith('.xlsx');

            if (isExcel) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                    processData(jsonData);
                };
                reader.readAsArrayBuffer(file);
            } else {
                Papa.parse(file, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => processData(results.data)
                });
            }
        });

        function processData(data) {
            // Filter strictly matching your Roon headers
            albumList = data.filter(row =>
                row['Title'] &&
                row['Album Artist'] &&
                parseInt(row['Track Count']) >= 5
            );

            if (albumList.length > 0) {
                localStorage.setItem('roonLibrary', JSON.stringify(albumList));
                showActionUI(albumList.length);
            } else {
                alert("Columns mismatch. Ensure file has Title, Album Artist, and Track Count.");
            }
        }

        function showActionUI(count) {
            document.getElementById('upload-section').classList.add('hidden');
            document.getElementById('action-section').classList.remove('hidden');
            document.getElementById('header').innerText = "Library Loaded";
            document.getElementById('stats').innerHTML = `
                ${count} Albums Loaded<br>
                <button class="update-link" onclick="clearLibrary()">Replace Library File</button>
            `;
        }

        function clearLibrary() {
            if (confirm("Wipe storage and drop new file?")) {
                localStorage.removeItem('roonLibrary');
                location.reload();
            }
        }

        function pickAlbum() {
            const selection = albumList[Math.floor(Math.random() * albumList.length)];

            document.getElementById('action-section').classList.add('hidden');
            document.getElementById('result').style.display = 'block';

            document.getElementById('display-album').innerText = selection['Title'] || 'Unknown Album';
            document.getElementById('display-artist').innerText = selection['Album Artist'] || 'Unknown Artist';

            // Map directly to your explicit headers: 'Date' and 'Genres'
            const rawDate = selection['Date'] || '';
            const matchYear = String(rawDate).match(/\d{4}/);
            const year = matchYear ? matchYear[0] : 'Unknown Year';

            const genre = selection['Genres'] || 'Unknown Genre';
            const tracks = selection['Track Count'] || '0';

            document.getElementById('display-meta').innerText = `${year} • ${genre} • ${tracks} TRACKS`;
        }
    </script>
</body>

</html>
